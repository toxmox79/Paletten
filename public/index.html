<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palettenerfassung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .panel { margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-light mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Palettenerfassung</span>
            <div>
                <button class="btn btn-secondary me-2" id="settingsBtn" data-bs-toggle="modal" data-bs-target="#settingsModal">Einstellungen</button>
                <button class="btn btn-secondary" id="logoutBtn">Abmelden</button>
            </div>
        </div>
    </nav>
    <div class="container">
        <div id="palettenstand" class="mb-4">
            <h3>Aktueller Palettenstand</h3>
            <table class="table table-striped" id="standTable">
                <thead>
                    <tr>
                        <th>Spedition</th>
                        <th>Stand</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="app">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">Neuer Eintrag</h3>
                </div>
                <div class="panel-body">
                    <form id="entryForm">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="datum">Datum</label>
                                <input type="date" class="form-control" id="datum" required>
                            </div>
                            <div class="col-md-6">
                                <label for="spedition">Spedition</label>
                                <select class="form-control" id="spedition">
                                    <option value="">Wählen...</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label for="lieferscheinnr">Lieferscheinnr</label>
                                <input type="text" class="form-control" id="lieferscheinnr" required>
                            </div>
                            <div class="col-md-3">
                                <label for="erhalten">Erhalten</label>
                                <input type="number" class="form-control" id="erhalten" min="0" required>
                            </div>
                            <div class="col-md-3">
                                <label for="abgegeben">Abgegeben</label>
                                <input type="number" class="form-control" id="abgegeben" min="0" required>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label for="notizen">Notizen</label>
                                <textarea class="form-control" id="notizen"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="erfasser">Erfasser</label>
                                <select class="form-control" id="erfasser">
                                    <option value="">Wählen...</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-3">Speichern</button>
                    </form>
                </div>
            </div>
            <div class="panel panel-default mt-4">
                <div class="panel-heading">
                    <h3 class="panel-title">Einträge</h3>
                </div>
                <div class="panel-body">
                    <button id="exportBtn" class="btn btn-secondary me-2">Exportieren</button>
                    <input type="file" id="importFile" class="form-control d-inline-block w-auto me-2" accept=".json">
                    <button id="importBtn" class="btn btn-secondary">Importieren</button>
                    <table class="table table-striped mt-3" id="entriesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Datum</th>
                                <th>Spedition</th>
                                <th>Lieferscheinnr</th>
                                <th>Erhalten</th>
                                <th>Abgegeben</th>
                                <th>Notizen</th>
                                <th>Erfasser</th>
                                <th>Aktionen</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals for editing -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eintrag bearbeiten</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editId">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="editDatum">Datum</label>
                                <input type="date" class="form-control" id="editDatum" required>
                            </div>
                            <div class="col-md-6">
                                <label for="editSpedition">Spedition</label>
                                <select class="form-control" id="editSpedition">
                                    <option value="">Wählen...</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label for="editLieferscheinnr">Lieferscheinnr</label>
                                <input type="text" class="form-control" id="editLieferscheinnr" required>
                            </div>
                            <div class="col-md-3">
                                <label for="editErhalten">Erhalten</label>
                                <input type="number" class="form-control" id="editErhalten" min="0">
                            </div>
                            <div class="col-md-3">
                                <label for="editAbgegeben">Abgegeben</label>
                                <input type="number" class="form-control" id="editAbgegeben" min="0">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6">
                                <label for="editNotizen">Notizen</label>
                                <textarea class="form-control" id="editNotizen"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="editErfasser">Erfasser</label>
                                <select class="form-control" id="editErfasser">
                                    <option value="">Wählen...</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Abbrechen</button>
                    <button type="button" class="btn btn-primary" id="saveEditBtn">Speichern</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let speditions = [];
        let erfasser = [];

        async function checkAuth() {
            try {
                const response = await fetch('/api/entries');
                if (response.status === 401) {
                    window.location.href = '/login.html';
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/login.html';
            }
        }

        async function loadSpeditions() {
            try {
                const response = await fetch('/api/speditions');
                if (response.ok) {
                    speditions = await response.json();
                    console.log('Loaded speditions:', speditions);
                    populateSelect('spedition', speditions);
                    populateSelect('editSpedition', speditions);
                } else if (response.status === 401) {
                    window.location.href = '/login.html';
                } else {
                    console.error('Failed to load speditions');
                }
            } catch (error) {
                console.error('Error loading speditions:', error);
            }
        }

        async function loadErfasser() {
            try {
                const response = await fetch('/api/erfasser');
                if (response.ok) {
                    erfasser = await response.json();
                    populateSelect('erfasser', erfasser);
                    populateSelect('editErfasser', erfasser);
                } else if (response.status === 401) {
                    window.location.href = '/login.html';
                } else {
                    console.error('Failed to load erfasser');
                }
            } catch (error) {
                console.error('Error loading erfasser:', error);
            }
        }

        function populateSelect(selectId, data) {
            const select = document.getElementById(selectId);
            console.log('Populating select', selectId, 'with data:', data);
            select.innerHTML = '<option value="">Wählen...</option>';
            data.forEach(item => {
                const option = document.createElement('option');
                option.value = (selectId === 'erfasser' || selectId === 'editErfasser') ? item.name : item.id;
                option.textContent = item.name;
                select.appendChild(option);
            });
        }

        async function loadEntries() {
            try {
                const response = await fetch('/api/entries');
                if (response.ok) {
                    const entries = await response.json();
                    displayEntries(entries);
                    calculateStand(entries);
                } else if (response.status === 401) {
                    window.location.href = '/login.html';
                } else {
                    console.error('Failed to load entries');
                }
            } catch (error) {
                console.error('Error loading entries:', error);
            }
        }

        function displayEntries(entries) {
            const tbody = document.querySelector('#entriesTable tbody');
            tbody.innerHTML = '';
            entries.forEach(entry => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${entry.id}</td>
                    <td>${entry.datum}</td>
                    <td>${entry.spedition_name || ''}</td>
                    <td>${entry.lieferscheinnr || ''}</td>
                    <td>${entry.erhalten || 0}</td>
                    <td>${entry.abgegeben || 0}</td>
                    <td>${entry.notizen || ''}</td>
                    <td>${entry.erfasser || ''}</td>
                    <td>
                        <button class="btn btn-sm btn-warning edit-btn" data-id="${entry.id}">Bearbeiten</button>
                        <button class="btn btn-sm btn-danger delete-btn" data-id="${entry.id}">Löschen</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function calculateStand(entries) {
            const stand = {};
            entries.forEach(entry => {
                const sped = entry.spedition_name;
                if (!stand[sped]) stand[sped] = 0;
                stand[sped] += (entry.erhalten || 0) - (entry.abgegeben || 0);
            });
            const tbody = document.querySelector('#standTable tbody');
            tbody.innerHTML = '';
            Object.keys(stand).forEach(sped => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${sped}</td><td>${stand[sped]}</td>`;
                tbody.appendChild(row);
            });
        }

        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                datum: document.getElementById('datum').value,
                spedition_id: document.getElementById('spedition').value,
                lieferscheinnr: document.getElementById('lieferscheinnr').value,
                erhalten: parseInt(document.getElementById('erhalten').value) || 0,
                abgegeben: parseInt(document.getElementById('abgegeben').value) || 0,
                notizen: document.getElementById('notizen').value,
                erfasser: document.getElementById('erfasser').value
            };
            try {
                const response = await fetch('/api/entries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    loadEntries();
                    e.target.reset();
                } else if (response.status === 401) {
                    window.location.href = '/login.html';
                } else {
                    console.error('Failed to save entry');
                }
            } catch (error) {
                console.error('Error saving entry:', error);
            }
        });

        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('edit-btn')) {
                const id = e.target.dataset.id;
                const response = await fetch(`/api/entries/${id}`);
                if (response.ok) {
                    const entry = await response.json();
                    document.getElementById('editId').value = entry.id;
                    document.getElementById('editDatum').value = entry.datum;
                    document.getElementById('editSpedition').value = entry.spedition_id;
                    document.getElementById('editLieferscheinnr').value = entry.lieferscheinnr;
                    document.getElementById('editErhalten').value = entry.erhalten;
                    document.getElementById('editAbgegeben').value = entry.abgegeben;
                    document.getElementById('editNotizen').value = entry.notizen;
                    document.getElementById('editErfasser').value = entry.erfasser;
                    new bootstrap.Modal(document.getElementById('editModal')).show();
                }
            } else if (e.target.classList.contains('delete-btn')) {
                const id = e.target.dataset.id;
                if (confirm('Wirklich löschen?')) {
                    const response = await fetch(`/api/entries/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        loadEntries();
                    }
                }
            }
        });

        document.getElementById('saveEditBtn').addEventListener('click', async () => {
            const id = document.getElementById('editId').value;
            const data = {
                datum: document.getElementById('editDatum').value,
                spedition_id: document.getElementById('editSpedition').value,
                lieferscheinnr: document.getElementById('editLieferscheinnr').value,
                erhalten: parseInt(document.getElementById('editErhalten').value) || 0,
                abgegeben: parseInt(document.getElementById('editAbgegeben').value) || 0,
                notizen: document.getElementById('editNotizen').value,
                erfasser: document.getElementById('editErfasser').value
            };
            const response = await fetch(`/api/entries/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (response.ok) {
                loadEntries();
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/login.html';
        });

        // Settings functions
        async function loadSpeditionsForSettings() {
            try {
                const response = await fetch('/api/speditions');
                if (response.ok) {
                    const speditions = await response.json();
                    const list = document.getElementById('speditionsList');
                    list.innerHTML = '';
                    speditions.forEach(sped => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item d-flex justify-content-between align-items-center';
                        li.textContent = sped.name;
                        const btn = document.createElement('button');
                        btn.className = 'btn btn-danger btn-sm';
                        btn.textContent = 'Löschen';
                        btn.onclick = () => deleteSpedition(sped.id);
                        li.appendChild(btn);
                        list.appendChild(li);
                    });
                }
            } catch (error) {
                console.error('Error loading speditions for settings:', error);
            }
        }

        async function loadErfasserForSettings() {
            try {
                const response = await fetch('/api/erfasser');
                if (response.ok) {
                    const erfasser = await response.json();
                    console.log('Loaded erfasser for settings:', erfasser);
                    const list = document.getElementById('erfasserList');
                    console.log('Erfasser list element:', list);
                    list.innerHTML = '';
                    erfasser.forEach(erf => {
                        const li = document.createElement('li');
                        li.className = 'list-group-item d-flex justify-content-between align-items-center';
                        li.textContent = erf.name;
                        const btn = document.createElement('button');
                        btn.className = 'btn btn-danger btn-sm';
                        btn.textContent = 'Löschen';
                        btn.onclick = () => deleteErfasser(erf.id);
                        li.appendChild(btn);
                        list.appendChild(li);
                    });
                }
            } catch (error) {
                console.error('Error loading erfasser for settings:', error);
            }
        }

        async function deleteSpedition(id) {
            if (confirm('Spedition wirklich löschen?')) {
                const response = await fetch(`/api/speditions/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadSpeditions();
                    loadSpeditionsForSettings();
                }
            }
        }

        async function deleteErfasser(id) {
            if (confirm('Erfasser wirklich löschen?')) {
                const response = await fetch(`/api/erfasser/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadErfasserForSettings();
                }
            }
        }

        // Event listeners
        setTimeout(() => {
            document.getElementById('settingsBtn').addEventListener('click', () => {
                loadSpeditionsForSettings();
                loadErfasserForSettings();
            });

            document.getElementById('speditionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('newSpedition').value;
                console.log('Adding spedition:', name);
                const response = await fetch('/api/speditions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                console.log('Response status:', response.status);
                if (response.ok) {
                    console.log('Spedition added, reloading...');
                    loadSpeditions();
                    loadSpeditionsForSettings();
                    e.target.reset();
                }
            });

            document.getElementById('erfasserForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('newErfasser').value;
                console.log('Adding erfasser:', name);
                const response = await fetch('/api/erfasser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                console.log('Erfasser POST response:', response.status);
                if (response.ok) {
                    console.log('Erfasser added, reloading...');
                    loadErfasserForSettings();
                    e.target.reset();
                }
            });

            document.getElementById('exportBtn').addEventListener('click', async () => {
                const response = await fetch('/api/export');
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'palettenerfassung_export.json';
                    a.click();
                    window.URL.revokeObjectURL(url);
                }
            });

            document.getElementById('importBtn').addEventListener('click', async () => {
                const fileInput = document.getElementById('importFile');
                const file = fileInput.files[0];
                if (file) {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    const response = await fetch('/api/import', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) {
                        loadEntries();
                        alert('Import erfolgreich');
                    } else {
                        alert('Import fehlgeschlagen');
                    }
                }
            });
        }, 0);

        // Initialize
        checkAuth();
        loadSpeditions();
        loadErfasser();
        loadEntries();
    </script>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Einstellungen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h4>Speditionen verwalten</h4>
                    <form id="speditionForm" class="mb-3">
                        <div class="input-group">
                            <input type="text" class="form-control" id="newSpedition" placeholder="Neue Spedition" required>
                            <button type="submit" class="btn btn-primary">Hinzufügen</button>
                        </div>
                    </form>
                    <ul class="list-group" id="speditionsList"></ul>
                    <hr>
                    <h4>Erfasser verwalten</h4>
                    <form id="erfasserForm" class="mb-3">
                        <div class="input-group">
                            <input type="text" class="form-control" id="newErfasser" placeholder="Neuer Erfasser" required>
                            <button type="submit" class="btn btn-primary">Hinzufügen</button>
                        </div>
                    </form>
                    <ul class="list-group" id="erfasserList"></ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Schließen</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
