<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palettenerfassung Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .panel { margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-light mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Palettenerfassung</span>
            <div>
                <button class="btn btn-secondary me-2" data-bs-toggle="modal" data-bs-target="#settingsModal">Einstellungen</button>
                <a href="/logout" class="btn btn-outline-danger">Logout</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div id="palettenstand" class="mb-4">
            <h3>Aktueller Palettenstand</h3>
            <table class="table table-striped" id="standTable">
                <thead>
                    <tr>
                        <th>Spedition</th>
                        <th>Stand</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="app">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">Neuer Eintrag</h3>
                </div>
                <div class="panel-body">
                    <form id="entryForm">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="datum">Datum</label>
                                <input type="date" class="form-control" id="datum" required>
                            </div>
                            <div class="col-md-6">
                                <label for="spedition">Spedition</label>
                                <select class="form-control" id="spedition">
                                    <option value="">Wählen...</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="lieferscheinnr">Lieferscheinnr</label>
                                <input type="text" class="form-control" id="lieferscheinnr" required>
                            </div>
                            <div class="col-md-3">
                                <label for="erhalten">Erhalten</label>
                                <input type="number" class="form-control" id="erhalten" min="0" required>
                            </div>
                            <div class="col-md-3">
                                <label for="abgegeben">Abgegeben</label>
                                <input type="number" class="form-control" id="abgegeben" min="0" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <label for="notizen">Notizen</label>
                                <textarea class="form-control" id="notizen"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label for="erfasser">Erfasser</label>
                                <select class="form-control" id="erfasser">
                                    <option value="">Wählen...</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-3">Speichern</button>
                    </form>
                </div>
            </div>
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title">Einträge</h3>
                </div>
                <div class="panel-body">
                    <button id="exportBtn" class="btn btn-secondary">Exportieren</button>
                    <input type="file" id="importFile" class="form-control mt-2" accept=".json">
                    <button id="importBtn" class="btn btn-secondary mt-2">Importieren</button>
                    <table class="table table-striped mt-3" id="entriesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Datum</th>
                                <th>Spedition</th>
                                <th>Lieferscheinnr</th>
                                <th>Erhalten</th>
                                <th>Abgegeben</th>
                                <th>Notizen</th>
                                <th>Erfasser</th>
                                <th>Aktionen</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="settingsModalLabel">Einstellungen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h4>Speditionen verwalten</h4>
                    <form id="speditionForm" class="mb-3">
                        <div class="input-group">
                            <input type="text" class="form-control" id="newSpedition" placeholder="Neue Spedition" required>
                            <button type="submit" class="btn btn-primary">Hinzufügen</button>
                        </div>
                    </form>
                    <ul class="list-group" id="speditionsList"></ul>
                    <hr>
                    <h4>Erfasser verwalten</h4>
                    <form id="erfasserForm" class="mb-3">
                        <div class="input-group">
                            <input type="text" class="form-control" id="newErfasser" placeholder="Neuer Erfasser" required>
                            <button type="submit" class="btn btn-primary">Hinzufügen</button>
                        </div>
                    </form>
                    <ul class="list-group" id="erfasserList"></ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Schließen</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // API Base URL
        const API_BASE = '';

        // Load Speditions
        async function loadSpeditions() {
            try {
                const response = await fetch(`${API_BASE}/api/speditions`);
                const speditions = await response.json();
                const select = document.getElementById('spedition');
                select.innerHTML = '<option value="">Wählen...</option>';
                const list = document.getElementById('speditionsList');
                list.innerHTML = '';
                speditions.forEach(spedition => {
                    const option = document.createElement('option');
                    option.value = spedition.name;
                    option.textContent = spedition.name;
                    select.appendChild(option);

                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.textContent = spedition.name;
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-danger btn-sm';
                    btn.textContent = 'Löschen';
                    btn.onclick = () => deleteSpedition(spedition.id);
                    li.appendChild(btn);
                    list.appendChild(li);
                });
                updatePalettenstand();
            } catch (error) {
                console.error('Error loading speditions:', error);
            }
        }

        // Add Spedition
        document.getElementById('speditionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('newSpedition').value.trim();
            if (!name) return;
            try {
                await fetch(`${API_BASE}/api/speditions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                loadSpeditions();
                document.getElementById('newSpedition').value = '';
            } catch (error) {
                console.error('Error adding spedition:', error);
            }
        });

        // Delete Spedition
        async function deleteSpedition(id) {
            try {
                await fetch(`${API_BASE}/api/speditions/${id}`, { method: 'DELETE' });
                loadSpeditions();
            } catch (error) {
                console.error('Error deleting spedition:', error);
            }
        }

        // Load Erfasser
        async function loadErfasser() {
            try {
                const response = await fetch(`${API_BASE}/api/erfasser`);
                const erfasser = await response.json();
                const select = document.getElementById('erfasser');
                select.innerHTML = '<option value="">Wählen...</option>';
                const list = document.getElementById('erfasserList');
                list.innerHTML = '';
                erfasser.forEach(e => {
                    const option = document.createElement('option');
                    option.value = e.name;
                    option.textContent = e.name;
                    select.appendChild(option);

                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center';
                    li.textContent = e.name;
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-danger btn-sm';
                    btn.textContent = 'Löschen';
                    btn.onclick = () => deleteErfasser(e.id);
                    li.appendChild(btn);
                    list.appendChild(li);
                });
            } catch (error) {
                console.error('Error loading erfasser:', error);
            }
        }

        // Add Erfasser
        document.getElementById('erfasserForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('newErfasser').value.trim();
            if (!name) return;
            try {
                await fetch(`${API_BASE}/api/erfasser`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                loadErfasser();
                document.getElementById('newErfasser').value = '';
            } catch (error) {
                console.error('Error adding erfasser:', error);
            }
        });

        // Delete Erfasser
        async function deleteErfasser(id) {
            try {
                await fetch(`${API_BASE}/api/erfasser/${id}`, { method: 'DELETE' });
                loadErfasser();
            } catch (error) {
                console.error('Error deleting erfasser:', error);
            }
        }

        // Update Palettenstand
        async function updatePalettenstand() {
            try {
                const response = await fetch(`${API_BASE}/api/palettenstand`);
                const stands = await response.json();
                const tbody = document.querySelector('#standTable tbody');
                tbody.innerHTML = '';
                stands.forEach(stand => {
                    const row = document.createElement('tr');
                    row.innerHTML = `<td>${stand.spedition}</td><td>${stand.stand}</td>`;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading palettenstand:', error);
            }
        }

        // Load Entries
        async function loadEntries() {
            try {
                const response = await fetch(`${API_BASE}/api/entries`);
                const entries = await response.json();
                const tbody = document.querySelector('#entriesTable tbody');
                tbody.innerHTML = '';
                entries.forEach(entry => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${entry.id}</td>
                        <td>${entry.datum}</td>
                        <td>${entry.spedition}</td>
                        <td>${entry.lieferscheinnr}</td>
                        <td>${entry.erhalten}</td>
                        <td>${entry.abgegeben}</td>
                        <td>${entry.notizen}</td>
                        <td>${entry.erfasser}</td>
                        <td><button class="btn btn-danger btn-sm" onclick="deleteEntry(${entry.id})">Löschen</button></td>
                    `;
                    tbody.appendChild(row);
                });
                updatePalettenstand();
            } catch (error) {
                console.error('Error loading entries:', error);
            }
        }

        // Save Entry
        document.getElementById('entryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const entry = {
                datum: document.getElementById('datum').value,
                spedition: document.getElementById('spedition').value,
                lieferscheinnr: document.getElementById('lieferscheinnr').value,
                erhalten: parseInt(document.getElementById('erhalten').value),
                abgegeben: parseInt(document.getElementById('abgegeben').value),
                notizen: document.getElementById('notizen').value,
                erfasser: document.getElementById('erfasser').value
            };
            try {
                await fetch(`${API_BASE}/api/entries`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(entry)
                });
                loadEntries();
                document.getElementById('entryForm').reset();
            } catch (error) {
                console.error('Error saving entry:', error);
            }
        });

        // Delete Entry
        async function deleteEntry(id) {
            try {
                await fetch(`${API_BASE}/api/entries/${id}`, { method: 'DELETE' });
                loadEntries();
            } catch (error) {
                console.error('Error deleting entry:', error);
            }
        }

        // Export
        document.getElementById('exportBtn').addEventListener('click', async function() {
            try {
                const response = await fetch(`${API_BASE}/api/entries`);
                const data = await response.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'palettenerfassung_export.json';
                a.click();
                URL.revokeObjectURL(url);
            } catch (error) {
                console.error('Error exporting:', error);
            }
        });

        // Import
        document.getElementById('importBtn').addEventListener('click', function() {
            const file = document.getElementById('importFile').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        for (const entry of data) {
                            const { id, ...entryWithoutId } = entry;
                            await fetch(`${API_BASE}/api/entries`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(entryWithoutId)
                            });
                        }
                        loadEntries();
                        alert('Import erfolgreich!');
                    } catch (error) {
                        alert('Ungültige JSON-Datei.');
                    }
                };
                reader.readAsText(file);
            } else {
                alert('Bitte wähle eine Datei aus.');
            }
        });

        // Initialize
        loadSpeditions();
        loadErfasser();
        loadEntries();
    </script>
</body>
</html>
